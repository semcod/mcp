{% extends "base.html" %}
{% block title %}Skills - MCP WebUI{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Run skill</h1>
<form hx-post="/skills/run" hx-target="#out" hx-swap="innerHTML" class="bg-white rounded shadow p-4 grid grid-cols-2 gap-3">
  <label class="text-sm">model
    <select name="model" class="border p-1 rounded w-full">
      <option value="mcp-skills/refactor">mcp-skills/refactor</option>
      <option value="mcp-skills/analyze">mcp-skills/analyze</option>
    </select>
  </label>
  <label class="text-sm">repo_id <input name="repo_id" class="border p-1 rounded w-full" placeholder="team/sample"></label>
  <label class="text-sm col-span-2">source_path <input name="source_path" class="border p-1 rounded w-full" placeholder="/host-semcod/code2schema"></label>
  <label class="text-sm col-span-2">prompt <textarea name="prompt" class="border p-1 rounded w-full h-24" required>Refaktoryzuj moduł utils, popraw nazewnictwo.</textarea></label>
  <button class="bg-slate-900 text-white px-4 py-1 rounded col-span-2">Run</button>
</form>
<pre id="out" class="mt-4 bg-slate-50 p-3 text-xs overflow-x-auto rounded shadow"></pre>
{% endblock %}
