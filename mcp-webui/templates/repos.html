{% extends "base.html" %}
{% block title %}Repos - MCP WebUI{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Repositories</h1>

<form method="post" action="/repos/sync" class="bg-white rounded shadow p-4 mb-6 flex gap-2 items-end">
  <div class="flex flex-col">
    <label class="text-xs">repo_id</label>
    <input name="repo_id" required class="border p-1 rounded" placeholder="team/sample">
  </div>
  <div class="flex flex-col flex-1">
    <label class="text-xs">source_path</label>
    <input name="source_path" required class="border p-1 rounded" placeholder="/host-semcod/code2schema">
  </div>
  <div class="flex flex-col">
    <label class="text-xs">branch</label>
    <input name="branch" value="main" class="border p-1 rounded w-24">
  </div>
  <button class="bg-slate-900 text-white px-4 py-1 rounded">Sync</button>
</form>

<table class="w-full bg-white rounded shadow text-sm">
  <thead class="bg-slate-200 text-left">
    <tr><th class="p-2">repo_id</th><th class="p-2">branch</th><th class="p-2">last commit</th><th class="p-2"></th></tr>
  </thead>
  <tbody>
  {% for r in repos %}
    <tr class="border-t">
      <td class="p-2 font-mono">{{ r.repo_id }}</td>
      <td class="p-2">{{ r.active_branch }}</td>
      <td class="p-2 font-mono text-xs">{{ r.last_commit[:10] }}</td>
      <td class="p-2"><a class="text-blue-600" href="/diff?repo_id={{ r.repo_id }}">diff</a></td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
