services:
  # MCP Git Proxy - izolacja operacji git i cache repozytoriów
  mcp-git-proxy:
    build:
      context: .
      dockerfile: mcp-git-proxy/Dockerfile
    container_name: mcp-git-proxy
    environment:
      - GIT_PROXY_REPO_ROOT=/git-repos
      - GIT_PROXY_CACHE_ROOT=/git-cache
    volumes:
      - git-repo-storage:/git-repos
      - git-cache-storage:/git-cache
      - ./repos:/host-repos:ro
      - ..:/host-semcod:ro
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - mcp-network

  # MCP Skills Server - Analiza kodu i metryki
  mcp-skills:
    build: ./mcp-skills
    container_name: mcp-skills-server
    environment:
      - PYTHONUNBUFFERED=1
      - SKILLS_REPO_BASE=/skills-cache
      - GIT_PROXY_URL=http://mcp-git-proxy:8080
    volumes:
      - skills-cache:/skills-cache
      - ./mcp-skills/server.py:/app/server.py:ro
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      - mcp-git-proxy
    networks:
      - mcp-network

  # LLM Agent - Koordynacja refaktoryzacji
  llm-agent:
    build: ./llm-agent
    container_name: llm-agent
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter-lite}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-openrouter/x-ai/grok-code-fast-1}
      - GITHUB_PAT=${GITHUB_PAT:-}
      - GIT_PROXY_URL=http://mcp-git-proxy:8080
    volumes:
      - ./repos:/host-repos:ro
      - ./output:/output
      - skills-cache:/skills-cache
      - ./git2mcp:/app/git2mcp:ro
      - ./llm-agent/agent.py:/app/agent.py:ro
      - ./llm-agent/agent_standalone.py:/app/agent_standalone.py:ro
      - ./llm-agent/agent_git2mcp.py:/app/agent_git2mcp.py:ro
    depends_on:
      - mcp-git-proxy
      - mcp-skills
    networks:
      - mcp-network
    profiles:
      - agent

  # Dashboard - Wizualizacja wyników
  dashboard:
    build: ./dashboard
    container_name: mcp-dashboard
    environment:
      - DASHBOARD_PORT=8080
    volumes:
      - ./output:/output:ro
      - ./repos:/repos:ro
      - ./dashboard/index.html:/app/index.html:ro
      - ./dashboard/server.py:/app/server.py:ro
    ports:
      - "8085:8080"
    depends_on:
      - mcp-git-proxy
      - mcp-skills
    restart: unless-stopped
    networks:
      - mcp-network

  # MCP Gateway - Proxy dla MCP serwerów
  mcp-gateway:
    image: docker/mcp-gateway:latest
    container_name: mcp-gateway
    environment:
      - MCP_SERVERS_CONFIG=/config/servers.json
    volumes:
      - ./config:/config:ro
    ports:
      - "8080:8080"
    profiles:
      - gateway
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  git-repo-storage:
  git-cache-storage:
  skills-cache:
