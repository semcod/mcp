# Production overlay: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# - removes dev source mounts (services run only baked images)
# - removes public ports for internal services
# - keeps public ports only for gateway, webui, openwebui, docs
services:
  mcp-git-proxy:
    ports: []
    volumes:
      - git-repo-storage:/git-repos
      - git-cache-storage:/git-cache

  mcp-skills:
    volumes:
      - skills-cache:/skills-cache

  llm-agent:
    volumes:
      - ./output:/output
      - skills-cache:/skills-cache

  mcp-gateway:
    volumes:
      - ./mcp-gateway/tenants:/app/tenants:ro
      - audit-storage:/audit

  mcp-webui:
    environment:
      - GATEWAY_URL=http://mcp-gateway:9000
      - GIT_PROXY_URL=http://mcp-git-proxy:8080
      - WEBUI_API_KEY=${WEBUI_API_KEY}

  dashboard:
    volumes:
      - ./output:/output:ro
